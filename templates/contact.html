<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
	<script src="{{ url_for('static', filename='script.js') }}" defer></script>
	<title>Contact — Maison</title>
	<style>
		.contact-wrap {
			max-width: 800px;
			margin: 4rem auto;
			padding: 0 2rem;
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 4rem;
		}

		h1 {
			font-size: 1.6rem;
			margin-bottom: 1rem;
		}

		.info p {
			color: #666;
			font-size: 0.9rem;
			line-height: 1.7;
			margin-bottom: 1.5rem;
		}

		.info-item {
			margin-bottom: 1rem;
		}

		.info-item span {
			display: block;
			font-size: 0.72rem;
			color: #888;
			text-transform: uppercase;
		}

		@media (max-width: 600px) {
			.contact-wrap {
				grid-template-columns: 1fr;
				gap: 2rem;
			}
		}
	</style>
</head>

<body>
	<nav>
		<span class="logo"><a href="/">Maison</a></span>
		<ul>
			<li><a href="/">Home</a></li>
			<li><a href="shop">Shop</a></li>
			<li><a href="contact" class="active">Contact</a></li>
		</ul>
	</nav>

	<div class="contact-wrap">
		<div class="info">
			<h1>Contact Us</h1>
			<p>Have a question about sizing or availability? We'll get back to you within 24 hours.</p>
			<div class="info-item"><span>Email</span>hello@maison.ro</div>
			<div class="info-item"><span>Phone</span>+40 712 345 678</div>
			<div class="info-item"><span>Address</span>Calea Floreasca 19, București</div>
			<div class="info-item"><span>Hours</span>Mon – Sat, 10:00 – 19:00</div>
		</div>

		<div class="form-section">
			<div class="msg" id="form-msg"></div>
			<div class="form-group"><label>Name</label><input type="text" id="c-name" placeholder="Maria Ionescu"></div>
			<div class="form-group"><label>Email</label><input type="email" id="c-email"
					placeholder="maria@example.com"></div>
			<div class="form-group"><label>Message</label><textarea id="c-msg" rows="5"
					placeholder="How can we help?"></textarea></div>
			<button class="btn" onclick="sendContact()" style="width:100%">Send Message</button>
		</div>
	</div>

	<footer>
		<p>© 2026 Maison. All rights reserved.</p>
	</footer>
	<script>
		function sendContact() {
			const name = document.getElementById('c-name').value.trim();
			const email = document.getElementById('c-email').value.trim();
			const msg = document.getElementById('c-msg').value.trim();
			const el = document.getElementById('form-msg');

			if (!name || !email || !msg) {
				el.textContent = 'Please fill in all fields.';
				el.className = 'msg error show'; return;
			}
			el.textContent = 'Message sent! We will get back to you shortly.';
			el.className = 'msg success show';
			document.getElementById('c-name').value = '';
			document.getElementById('c-email').value = '';
			document.getElementById('c-msg').value = '';
		}
	</script>
</body>

</html>
