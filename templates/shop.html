<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Shop — Maison</title>
	<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
	<script src="{{ url_for('static', filename='script.js') }}" defer></script>
	<style>
		h1 {
			padding: 2rem;
			font-size: 1.5rem;
			border-bottom: 1px solid #ddd;
		}

		.grid {
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			gap: 1.5rem;
			padding: 2rem;
		}

		.card {
			border: 1px solid #ddd;
			cursor: pointer;
		}

		.card img {
			width: 100%;
			height: 260px;
			object-fit: cover;
			display: block;
			background: #f5f5f5;
		}

		.card-body {
			padding: 0.8rem;
		}

		.card-cat {
			font-size: 0.72rem;
			color: #888;
			text-transform: uppercase;
		}

		.card-name {
			font-weight: bold;
			margin: 0.2rem 0;
		}

		.card-price {
			font-size: 0.9rem;
		}

		.card:hover {
			border-color: #111;
		}

		.overlay {
			display: none;
			position: fixed;
			inset: 0;
			background: rgba(0, 0, 0, 0.5);
			z-index: 200;
			align-items: center;
			justify-content: center;
		}

		.modal {
			background: #fff;
			width: 640px;
			max-width: 95%;
			max-height: 90vh;
			overflow-y: auto;
			display: grid;
			grid-template-columns: 1fr 1fr;
		}

		.modal img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			display: block;
			background: #f5f5f5;
		}

		.modal-body {
			padding: 1.5rem;
		}

		.modal-body h2 {
			margin-bottom: 0.3rem;
		}

		.modal-body .price {
			font-size: 1.1rem;
			font-weight: bold;
			margin-bottom: 0.5rem;
		}

		.modal-body .desc {
			font-size: 0.85rem;
			color: #666;
			margin-bottom: 0.5rem;
		}

		.modal-body .sizes {
			font-size: 0.82rem;
			color: #888;
			margin-bottom: 1rem;
		}

		hr {
			border: none;
			border-top: 1px solid #ddd;
			margin: 0.8rem 0;
		}

		.close-btn {
			float: right;
			background: none;
			border: none;
			font-size: 1.2rem;
			cursor: pointer;
		}

		@media (max-width: 700px) {
			.grid {
				grid-template-columns: repeat(2, 1fr);
			}

			.modal {
				grid-template-columns: 1fr;
			}

			.modal img {
				height: 220px;
			}
		}
	</style>
</head>

<body>
	<nav>
		<span class="logo"><a href="/">Maison</a></span>
		<ul>
			<li><a href="/">Home</a></li>
			<li><a href="shop" class="active">Shop</a></li>
			<li><a href="contact">Contact</a></li>
		</ul>
	</nav>

	<h1>All Dresses</h1>
	<div class="spinner" id="spinner"></div>

	<div class="filters-container" style="max-width: 1200px; margin: 0 auto; padding: 20px; text-align: center;">
    
    <div class="filter-group" style="margin-bottom: 15px;">
        <span style="font-weight: bold; margin-right: 15px; color: #333;">Categories:</span>
        <button class="filter-btn" onclick="filterCategory('All', this)" style="font-weight:bold">All</button>
        <button class="filter-btn" onclick="filterCategory('Evening', this)">Evening</button>
        <button class="filter-btn" onclick="filterCategory('Daywear', this)">Daywear</button>
        <button class="filter-btn" onclick="filterCategory('Bridal', this)">Bridal</button>
    </div>

    <div class="filter-group">
        <span style="font-weight: bold; margin-right: 15px; color: #333;">Colors:</span>
        <button class="color-btn" onclick="filterByColor('All', this)" style="font-weight:bold">All</button>
        <button class="color-btn" onclick="filterByColor('Black', this)">Black</button>
        <button class="color-btn" onclick="filterByColor('White', this)">White</button>
        <button class="color-btn" onclick="filterByColor('Red', this)">Red</button>
        <button class="color-btn" onclick="filterByColor('Blue', this)">Blue</button>
    </div>
    
</div>

<div class="grid" id="grid">
    </div>

	<div class="grid" id="grid"></div>

	<!-- Modal -->
	<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
		<div class="modal">
			<img id="m-img" src="" alt="">
			<div class="modal-body">
				<button class="close-btn" onclick="closeModal()">✕</button>
				<div id="m-cat" style="font-size:0.72rem;color:#888;text-transform:uppercase"></div>
				<h2 id="m-name"></h2>
				<div class="price" id="m-pret"></div>
				<div class="desc" id="m-desc"></div>
				<div class="sizes" id="m-marime"></div>
				<hr>

				<div id="order-form">
					<input type="hidden" id="o-id">
					<div class="form-group"><label>Full Name</label><input type="text" id="o-nume"
							placeholder="Maria Ionescu"></div>
					<div class="form-group"><label>Phone</label><input type="tel" id="o-telefon"
							placeholder="0712 345 678"></div>
					<div class="form-group"><label>Address</label><textarea id="o-adresa" rows="2"
							placeholder="Street, city, county"></textarea></div>
					<div class="form-group"><label>Quantity</label><input type="number" id="o-cantitate" value="1"
							min="1"></div>
					<div class="msg" id="order-msg"></div>
					<button class="btn" id="o-btn" onclick="placeOrder()" style="width:100%">Place Order</button>
				</div>

				<div id="order-confirm" style="display:none;text-align:center;padding:1rem 0">
					<div style="font-size:2rem">✓</div>
					<p id="confirm-text" style="margin:0.5rem 0;font-size:0.9rem"></p>
					<button class="btn btn-outline" onclick="closeModal()" style="margin-top:1rem;width:100%">Continue
						Shopping</button>
				</div>
			</div>
		</div>
	</div>

	<footer>
		<p>© 2026 Maison. All rights reserved.</p>
	</footer>
	<script>
        window.addEventListener('DOMContentLoaded', function() {
            loadProducts();
        });
    </script>
</body>

</html>
